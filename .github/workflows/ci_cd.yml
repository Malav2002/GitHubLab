name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGION: us-east4
  REPOSITORY_NAME: my-repo

jobs:
  build-train-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. Cache pip dependencies ──────────────────────────────────────────
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 5. Run unit tests ──────────────────────────────────────────────────
      - name: Run tests
        run: pytest test_train_and_save_model.py -v

      # ── 6. Authenticate with GCP ───────────────────────────────────────────
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 7. Set up Cloud SDK ────────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      # ── 8. Configure Docker for Artifact Registry ──────────────────────────
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ── 9. Train and save model ────────────────────────────────────────────
      - name: Train and save model
        env:
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          VERSION_FILE_NAME: ${{ secrets.VERSION_FILE_NAME }}
        run: |
          python train_and_save_model.py | tee train_output.txt
          MODEL_VERSION=$(grep "MODEL_VERSION_OUTPUT:" train_output.txt | grep -o '[0-9]*$')
          echo "MODEL_VERSION=${MODEL_VERSION}" >> $GITHUB_ENV
          echo "Extracted model version: ${MODEL_VERSION}"

      # ── 10. Build and push Docker image ────────────────────────────────────
      - name: Build and Push Docker image
        env:
          IMAGE_NAME: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY_NAME }}/model-image
        run: |
          docker build -t ${IMAGE_NAME}:${{ env.MODEL_VERSION }} .
          docker push ${IMAGE_NAME}:${{ env.MODEL_VERSION }}
          docker tag ${IMAGE_NAME}:${{ env.MODEL_VERSION }} ${IMAGE_NAME}:latest
          docker push ${IMAGE_NAME}:latest
